<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notdone.dev — Pi Cluster App Directory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-hover: #1a1a1a;
            --border: #222222;
            --border-hover: #33ff33;
            --green: #33ff33;
            --green-dim: #1a8c1a;
            --amber: #ffb833;
            --red: #ff4444;
            --text: #cccccc;
            --text-dim: #666666;
            --text-bright: #ffffff;
            --font: 'JetBrains Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* CRT glow effect */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 999;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Header */
        header {
            text-align: center;
            padding: 3rem 0 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--green);
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(51, 255, 51, 0.3), 0 0 40px rgba(51, 255, 51, 0.1);
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 2.8rem;
            background: var(--green);
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .subtitle {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .prompt {
            color: var(--green-dim);
        }

        /* Stats bar */
        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            font-size: 0.75rem;
        }

        .stat {
            color: var(--text-dim);
        }

        .stat-value {
            color: var(--amber);
            font-weight: 500;
        }

        /* Category headers */
        .category-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 2rem 0 1rem;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .category-header:first-child {
            margin-top: 0;
        }

        .category-header::before {
            content: '//';
            color: var(--green-dim);
            font-weight: 700;
        }

        .category-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* App grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.25rem;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 2px;
            background: var(--green);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .card:hover {
            border-color: var(--border-hover);
            background: var(--surface-hover);
            box-shadow: 0 0 20px rgba(51, 255, 51, 0.05);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .card-icon {
            width: 2.5rem;
            height: 2.5rem;
            flex-shrink: 0;
            color: var(--green);
            filter: drop-shadow(0 0 6px rgba(51, 255, 51, 0.3));
        }

        .card-icon svg {
            width: 100%;
            height: 100%;
        }

        .card-name {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-bright);
            flex: 1;
        }

        /* Status blip */
        .status-blip {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #444;
            transition: background 0.3s ease;
        }

        .status-blip[data-status="healthy"] {
            background: var(--green);
            box-shadow: 0 0 6px rgba(51, 255, 51, 0.6);
            animation: pulse-green 2s ease-in-out infinite;
        }

        .status-blip[data-status="unhealthy"] {
            background: var(--red);
            box-shadow: 0 0 6px rgba(255, 68, 68, 0.6);
        }

        .status-blip[data-status="degraded"] {
            background: var(--amber);
            box-shadow: 0 0 6px rgba(255, 184, 51, 0.6);
        }

        .status-blip[data-status="unknown"] {
            background: #444;
        }

        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 6px rgba(51, 255, 51, 0.6); }
            50% { box-shadow: 0 0 12px rgba(51, 255, 51, 0.9); }
        }

        .card-desc {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 0.6rem;
            padding-left: 3.25rem;
            line-height: 1.4;
        }

        .card-metrics {
            display: flex;
            gap: 0.4rem;
            padding-left: 3.25rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .card-metric {
            font-size: 0.6rem;
            padding: 0.15rem 0.4rem;
            border-radius: 2px;
            background: rgba(51, 255, 51, 0.06);
            border: 1px solid rgba(51, 255, 51, 0.15);
            color: var(--green-dim);
            white-space: nowrap;
        }

        .card-metric .metric-label {
            color: var(--text-dim);
            margin-right: 0.2rem;
        }

        .card-metric.warn {
            background: rgba(255, 184, 51, 0.08);
            border-color: rgba(255, 184, 51, 0.25);
            color: var(--amber);
        }

        .card-metric.danger {
            background: rgba(255, 68, 68, 0.08);
            border-color: rgba(255, 68, 68, 0.25);
            color: var(--red);
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            padding-left: 3.25rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.75rem;
            font-family: var(--font);
            font-size: 0.7rem;
            border-radius: 3px;
            text-decoration: none;
            transition: all 0.15s ease;
            font-weight: 400;
        }

        .btn-launch {
            background: rgba(51, 255, 51, 0.1);
            border: 1px solid var(--green-dim);
            color: var(--green);
        }

        .btn-launch:hover {
            background: rgba(51, 255, 51, 0.2);
            border-color: var(--green);
            box-shadow: 0 0 10px rgba(51, 255, 51, 0.15);
        }

        .btn-repo {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }

        .btn-repo:hover {
            border-color: var(--text);
            color: var(--text);
        }

        /* Cluster overview */
        .cluster-section {
            margin-top: 2.5rem;
        }

        .cluster-nodes {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .node-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1rem 1.25rem;
            font-size: 0.7rem;
            line-height: 1.8;
        }

        .node-header {
            color: var(--green);
            margin-bottom: 0.5rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bar-row {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .bar-label {
            color: var(--text-dim);
            width: 2.5rem;
            flex-shrink: 0;
        }

        .bar-graph {
            flex: 1;
            letter-spacing: 0;
        }

        .bar-pct {
            width: 3.5rem;
            text-align: right;
            flex-shrink: 0;
        }

        .bar-detail {
            color: var(--text-dim);
            padding-left: 3rem;
            font-size: 0.65rem;
        }

        .color-green { color: var(--green); }
        .color-amber { color: var(--amber); }
        .color-red { color: var(--red); }

        .node-pods {
            color: var(--text-dim);
            margin-top: 0.25rem;
        }

        .node-pods span { color: var(--amber); }

        .cluster-totals {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: var(--text-dim);
            padding: 0.75rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
        }

        .cluster-totals .highlight { color: var(--green); }
        .cluster-totals .val { color: var(--amber); }

        /* Footer */
        footer {
            text-align: center;
            padding: 2.5rem 0 2rem;
            margin-top: 2.5rem;
            border-top: 1px solid var(--border);
        }

        .footer-text {
            font-size: 0.7rem;
            color: var(--text-dim);
            line-height: 1.8;
        }

        .footer-text .highlight {
            color: var(--green-dim);
        }

        /* Responsive */
        @media (max-width: 700px) {
            .logo { font-size: 2rem; }
            .cursor { height: 2rem; }
            .grid { grid-template-columns: 1fr; }
            .stats { gap: 1rem; flex-wrap: wrap; }
            .container { padding: 1rem; }
            header { padding: 2rem 0 1.5rem; }
            .cluster-nodes { grid-template-columns: 1fr; }
            .node-panel { font-size: 0.6rem; overflow-x: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">notdone.dev<span class="cursor"></span></div>
            <div class="subtitle"><span class="prompt">$</span> Pi Cluster App Directory</div>
        </header>

        <div class="stats">
            <div class="stat" id="health-stat"><span class="stat-value">...</span> loading</div>
            <div class="stat"><span class="stat-value">2x</span> Raspberry Pi 4</div>
            <div class="stat"><span class="stat-value">k3s</span> orchestration</div>
            <div class="stat" id="cpu-stat"></div>
            <div class="stat" id="mem-stat"></div>
        </div>

        <div id="apps"></div>

        <div class="cluster-section" id="cluster-section" style="display:none">
            <div class="category-header">cluster nodes</div>
            <div class="cluster-nodes" id="cluster-nodes"></div>
            <div class="cluster-totals" id="cluster-totals"></div>
        </div>

        <footer>
            <div class="footer-text">
                <span class="highlight">&gt;</span> running on bare-metal arm64 &mdash; 2x Raspberry Pi 4 | k3s<br>
                <span class="highlight">&gt;</span> ~/made/by/<a href="https://arlint.dev" target="_blank" rel="noopener" style="color:var(--green-dim);text-decoration:none">arlintdev</a> &copy; 2026
            </div>
        </footer>
    </div>

    <script>
        let apps = [];
        let categoryOrder = [];
        const container = document.getElementById('apps');

        function renderApps() {
            container.innerHTML = '';
            const grouped = {};
            apps.forEach(app => {
                if (!grouped[app.category]) grouped[app.category] = [];
                grouped[app.category].push(app);
            });

            categoryOrder.forEach(cat => {
                if (!grouped[cat]) return;
                container.innerHTML += `<div class="category-header">${cat}</div>`;
                const grid = document.createElement('div');
                grid.className = 'grid';
                grouped[cat].forEach(app => {
                    const repoBtn = app.repo
                        ? `<a href="https://github.com/${app.repo}" target="_blank" rel="noopener" class="btn btn-repo">repo</a>`
                        : `<span class="btn btn-repo" style="opacity:0.3;cursor:default">external</span>`;
                    grid.innerHTML += `
                        <div class="card" data-app="${app.key}">
                            <div class="card-header">
                                <span class="card-icon"><i data-lucide="${app.icon}"></i></span>
                                <span class="card-name">${app.name}</span>
                                <span class="status-blip" data-status="unknown" title="Checking..."></span>
                            </div>
                            <div class="card-desc">${app.desc}</div>
                            <div class="card-metrics" data-metrics-for="${app.key}"></div>
                            <div class="card-actions">
                                <a href="https://${app.url}" target="_blank" rel="noopener" class="btn btn-launch">launch &rarr;</a>
                                ${repoBtn}
                            </div>
                        </div>
                    `;
                });
                container.appendChild(grid);
            });
            lucide.createIcons();

            const el = document.getElementById('health-stat');
            el.innerHTML = `<span class="stat-value">${apps.length}</span> apps deployed`;
        }

        function updateStatus(data) {
            if (!data || !data.apps) return;
            let healthy = 0, total = apps.length;
            apps.forEach(app => {
                const info = data.apps[app.key];
                const card = document.querySelector(`[data-app="${app.key}"]`);
                if (!card) return;
                const blip = card.querySelector('.status-blip');
                if (!blip) return;
                const status = info ? info.status : 'unknown';
                blip.setAttribute('data-status', status);
                blip.title = info
                    ? `${status} — ${info.ready}/${info.desired} pods${info.httpOk ? ', HTTP ok' : ''}`
                    : 'No data';
                if (status === 'healthy') healthy++;
            });
            const el = document.getElementById('health-stat');
            el.innerHTML = `<span class="stat-value">${healthy}/${total}</span> healthy`;
        }

        function pollStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(updateStatus)
                .catch(() => {});
        }

        // --- Metrics rendering ---

        function updateCardMetrics(metricsData) {
            if (!metricsData || !metricsData.pods) return;
            apps.forEach(app => {
                const el = document.querySelector(`[data-metrics-for="${app.key}"]`);
                if (!el) return;
                const pod = metricsData.pods[app.key];
                if (!pod) {
                    el.innerHTML = '';
                    return;
                }
                const restartClass = pod.restarts > 3 ? 'danger' : pod.restarts > 0 ? 'warn' : '';
                el.innerHTML =
                    `<span class="card-metric"><span class="metric-label">cpu</span>${pod.cpuUsedM}m</span>` +
                    `<span class="card-metric"><span class="metric-label">mem</span>${pod.memUsedMi}Mi</span>` +
                    `<span class="card-metric"><span class="metric-label">node</span>${pod.node}</span>` +
                    `<span class="card-metric ${restartClass}"><span class="metric-label">restarts</span>${pod.restarts}</span>`;
            });
        }

        function makeBar(pct, width) {
            const filled = Math.round(pct / 100 * width);
            return '\u2588'.repeat(filled) + '\u2591'.repeat(width - filled);
        }

        function pctColor(pct) {
            if (pct >= 80) return 'color-red';
            if (pct >= 60) return 'color-amber';
            return 'color-green';
        }

        function updateCluster(data) {
            if (!data || !data.nodes || data.nodes.length === 0) return;
            const section = document.getElementById('cluster-section');
            const nodesEl = document.getElementById('cluster-nodes');
            const totalsEl = document.getElementById('cluster-totals');
            section.style.display = '';

            nodesEl.innerHTML = data.nodes.map(n => {
                const cpuBar = makeBar(n.cpuPercent, 24);
                const memBar = makeBar(n.memPercent, 24);
                const cpuCol = pctColor(n.cpuPercent);
                const memCol = pctColor(n.memPercent);
                const cpuTotalM = n.cpuCores * 1000;
                return `<div class="node-panel">
                    <div class="node-header">+-- ${n.name} (${n.role}) ---- ${n.ip} --+</div>
                    <div class="bar-row">
                        <span class="bar-label">CPU</span>
                        <span class="bar-graph ${cpuCol}">[${cpuBar}]</span>
                        <span class="bar-pct ${cpuCol}">${n.cpuPercent}%</span>
                    </div>
                    <div class="bar-detail">${n.cpuUsedM}m / ${cpuTotalM}m</div>
                    <div class="bar-row">
                        <span class="bar-label">MEM</span>
                        <span class="bar-graph ${memCol}">[${memBar}]</span>
                        <span class="bar-pct ${memCol}">${n.memPercent}%</span>
                    </div>
                    <div class="bar-detail">${n.memUsedMi}Mi / ${n.memTotalMi}Mi</div>
                    <div class="node-pods">PODS <span>${n.podCount}</span> running</div>
                </div>`;
            }).join('');

            const appCount = apps.length;
            totalsEl.innerHTML = `<span class="highlight">&gt;</span> CLUSTER: ` +
                `<span class="val">${data.totalCpuCores}</span> cores | ` +
                `<span class="val">${data.totalMemMi}</span>Mi | ` +
                `<span class="val">${data.clusterCpuPercent}%</span> CPU | ` +
                `<span class="val">${data.clusterMemPercent}%</span> MEM | ` +
                `<span class="val">${appCount}</span> apps`;
        }

        function updateStatsBar(data) {
            if (!data) return;
            const cpuEl = document.getElementById('cpu-stat');
            const memEl = document.getElementById('mem-stat');
            if (cpuEl) cpuEl.innerHTML = `<span class="stat-value">${data.clusterCpuPercent}%</span> cpu`;
            if (memEl) memEl.innerHTML = `<span class="stat-value">${data.clusterMemPercent}%</span> mem`;
        }

        function pollMetrics() {
            fetch('/api/metrics')
                .then(r => r.json())
                .then(data => {
                    updateCardMetrics(data);
                    updateCluster(data);
                    updateStatsBar(data);
                })
                .catch(() => {});
        }

        // Fetch app list from backend, then render and start polling
        fetch('/api/apps')
            .then(r => r.json())
            .then(data => {
                apps = data.apps || [];
                categoryOrder = data.categories || [];
                renderApps();
                pollStatus();
                pollMetrics();
                setInterval(pollStatus, 30000);
                setInterval(pollMetrics, 30000);
            })
            .catch(() => {
                container.innerHTML = '<div style="color:var(--red);text-align:center;padding:2rem">Failed to load apps</div>';
            });
    </script>
</body>
</html>
