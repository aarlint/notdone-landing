<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>notdone.dev — Pi Cluster App Directory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-hover: #1a1a1a;
            --border: #222222;
            --border-hover: #33ff33;
            --green: #33ff33;
            --green-dim: #1a8c1a;
            --amber: #ffb833;
            --red: #ff4444;
            --text: #cccccc;
            --text-dim: #666666;
            --text-bright: #ffffff;
            --font: 'JetBrains Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scanline overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.08) 2px,
                rgba(0, 0, 0, 0.08) 4px
            );
            pointer-events: none;
            z-index: 1000;
        }

        /* CRT glow effect */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0, 0, 0, 0.4) 100%);
            pointer-events: none;
            z-index: 999;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Header */
        header {
            text-align: center;
            padding: 3rem 0 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2.5rem;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--green);
            letter-spacing: -1px;
            text-shadow: 0 0 20px rgba(51, 255, 51, 0.3), 0 0 40px rgba(51, 255, 51, 0.1);
        }

        .cursor {
            display: inline-block;
            width: 3px;
            height: 2.8rem;
            background: var(--green);
            margin-left: 4px;
            vertical-align: middle;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .subtitle {
            margin-top: 0.75rem;
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .prompt {
            color: var(--green-dim);
        }

        /* Stats bar */
        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            font-size: 0.75rem;
        }

        .stat {
            color: var(--text-dim);
        }

        .stat-value {
            color: var(--amber);
            font-weight: 500;
        }

        /* Category headers */
        .category-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 2rem 0 1rem;
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .category-header:first-child {
            margin-top: 0;
        }

        .category-header::before {
            content: '//';
            color: var(--green-dim);
            font-weight: 700;
        }

        .category-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* App grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1.25rem;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 2px;
            background: var(--green);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .card:hover {
            border-color: var(--border-hover);
            background: var(--surface-hover);
            box-shadow: 0 0 20px rgba(51, 255, 51, 0.05);
        }

        .card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .card-icon {
            width: 2.5rem;
            height: 2.5rem;
            flex-shrink: 0;
            color: var(--green);
            filter: drop-shadow(0 0 6px rgba(51, 255, 51, 0.3));
        }

        .card-icon svg {
            width: 100%;
            height: 100%;
        }

        .card-name {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-bright);
            flex: 1;
        }

        /* Status blip */
        .status-blip {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
            background: #444;
            transition: background 0.3s ease;
        }

        .status-blip[data-status="healthy"] {
            background: var(--green);
            box-shadow: 0 0 6px rgba(51, 255, 51, 0.6);
            animation: pulse-green 2s ease-in-out infinite;
        }

        .status-blip[data-status="unhealthy"] {
            background: var(--red);
            box-shadow: 0 0 6px rgba(255, 68, 68, 0.6);
        }

        .status-blip[data-status="degraded"] {
            background: var(--amber);
            box-shadow: 0 0 6px rgba(255, 184, 51, 0.6);
        }

        .status-blip[data-status="unknown"] {
            background: #444;
        }

        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 6px rgba(51, 255, 51, 0.6); }
            50% { box-shadow: 0 0 12px rgba(51, 255, 51, 0.9); }
        }

        .card-desc {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-bottom: 1rem;
            padding-left: 3.25rem;
            line-height: 1.4;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            padding-left: 3.25rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.35rem 0.75rem;
            font-family: var(--font);
            font-size: 0.7rem;
            border-radius: 3px;
            text-decoration: none;
            transition: all 0.15s ease;
            font-weight: 400;
        }

        .btn-launch {
            background: rgba(51, 255, 51, 0.1);
            border: 1px solid var(--green-dim);
            color: var(--green);
        }

        .btn-launch:hover {
            background: rgba(51, 255, 51, 0.2);
            border-color: var(--green);
            box-shadow: 0 0 10px rgba(51, 255, 51, 0.15);
        }

        .btn-repo {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
        }

        .btn-repo:hover {
            border-color: var(--text);
            color: var(--text);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2.5rem 0 2rem;
            margin-top: 2.5rem;
            border-top: 1px solid var(--border);
        }

        .footer-text {
            font-size: 0.7rem;
            color: var(--text-dim);
            line-height: 1.8;
        }

        .footer-text .highlight {
            color: var(--green-dim);
        }

        /* Responsive */
        @media (max-width: 700px) {
            .logo { font-size: 2rem; }
            .cursor { height: 2rem; }
            .grid { grid-template-columns: 1fr; }
            .stats { gap: 1rem; flex-wrap: wrap; }
            .container { padding: 1rem; }
            header { padding: 2rem 0 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">notdone.dev<span class="cursor"></span></div>
            <div class="subtitle"><span class="prompt">$</span> Pi Cluster App Directory</div>
        </header>

        <div class="stats">
            <div class="stat" id="health-stat"><span class="stat-value">15</span> apps deployed</div>
            <div class="stat"><span class="stat-value">2x</span> Raspberry Pi 4</div>
            <div class="stat"><span class="stat-value">k3s</span> orchestration</div>
        </div>

        <div id="apps"></div>

        <footer>
            <div class="footer-text">
                <span class="highlight">&gt;</span> running on bare-metal arm64 &mdash; 2x Raspberry Pi 4 | k3s<br>
                <span class="highlight">&gt;</span> ~/made/by/<a href="https://arlint.dev" target="_blank" rel="noopener" style="color:var(--green-dim);text-decoration:none">arlintdev</a> &copy; 2026
            </div>
        </footer>
    </div>

    <script>
        const apps = [
            { key: "learn", name: "Learn", icon: "book-open", desc: "Educational games and lessons for kids with profiles and progress tracking", url: "learn.notdone.dev", repo: "aarlint/learn", category: "Productivity" },
            { key: "hunt", name: "Hunt", icon: "map", desc: "Montana hunting app with access maps, regulations, and trip planning", url: "hunt.notdone.dev", repo: "aarlint/hunt", category: "Fitness & Outdoors" },
            { key: "huddle", name: "Huddle", icon: "video", desc: "Real-time video conferencing with WebRTC, organizations, and multi-room", url: "huddle.notdone.dev", repo: "aarlint/huddle", category: "Productivity" },
            { key: "theplan", name: "The Plan", icon: "scroll", desc: "Political reform platform proposing eight policy pillars for governance", url: "theplan.notdone.dev", repo: "aarlint/theplan", category: "Political" },
            { key: "tools", name: "Tools", icon: "wrench", desc: "Developer utility suite for common tasks and code transformations", url: "tools.notdone.dev", repo: "aarlint/tools", category: "Productivity" },
            { key: "expenses", name: "Expenses", icon: "dollar-sign", desc: "Expense tracker with AI voice input, Claude parsing, and CSV export", url: "expense-tracker.notdone.dev", repo: "arlintdev/expenses", category: "Productivity" },
            { key: "shredded", name: "Shredded", icon: "dumbbell", desc: "Fitness community for logging lifts, tracking PRs, and achievements", url: "shredded.notdone.dev", repo: "aarlint/shredded", category: "Fitness & Outdoors" },
            { key: "hikes", name: "Hikes", icon: "mountain", desc: "Community hiking tracker for logging routes, distances, and elevation", url: "hikes.notdone.dev", repo: "aarlint/hikemoms", category: "Fitness & Outdoors" },
            { key: "plantmontana", name: "Plant Montana", icon: "sprout", desc: "Western Montana gardening guide with frost dates and zone recommendations", url: "plantmontana.notdone.dev", repo: "aarlint/plantmontana", category: "Fitness & Outdoors" },
            { key: "fruittrees", name: "Fruit Trees", icon: "apple", desc: "Western fruit tree guide with pollination partners and cold hardiness data", url: "fruittrees.notdone.dev", repo: "aarlint/fruittrees", category: "Fitness & Outdoors" },
            { key: "lines", name: "Lines", icon: "grid-3x3", desc: "Montana property lines viewer with parcel search and ownership lookup", url: "lines.notdone.dev", repo: "aarlint/lines", category: "Productivity" },
            { key: "emulator", name: "Emulator", icon: "joystick", desc: "Retro game emulator for N64, SNES, and Genesis with ROM management", url: "emulator.notdone.dev", repo: "aarlint/emulator", category: "Fun" },
            { key: "btdebug", name: "BT Debug", icon: "radio", desc: "Bluetooth diagnostics tool for device scanning and connection monitoring", url: "btdebug.notdone.dev", repo: "aarlint/bluetooth", category: "Development" },
            { key: "code", name: "Code", icon: "code", desc: "Browser-based code editor and development environment", url: "code.notdone.dev", repo: null, category: "Development" },
            { key: "worlddomination", name: "World Domination", icon: "crown", desc: "Satirical political campaign for a fictional world leader", url: "worlddomination.notdone.dev", repo: "aarlint/worlddomination", category: "Political" }
        ];

        const categoryOrder = ["Productivity", "Fitness & Outdoors", "Development", "Political", "Fun"];
        const container = document.getElementById('apps');

        // Group apps by category
        const grouped = {};
        apps.forEach(app => {
            if (!grouped[app.category]) grouped[app.category] = [];
            grouped[app.category].push(app);
        });

        // Render categories and cards
        categoryOrder.forEach(cat => {
            if (!grouped[cat]) return;
            container.innerHTML += `<div class="category-header">${cat}</div>`;
            const grid = document.createElement('div');
            grid.className = 'grid';
            grouped[cat].forEach(app => {
                const repoBtn = app.repo
                    ? `<a href="https://github.com/${app.repo}" target="_blank" rel="noopener" class="btn btn-repo">repo</a>`
                    : `<span class="btn btn-repo" style="opacity:0.3;cursor:default">external</span>`;
                grid.innerHTML += `
                    <div class="card" data-app="${app.key}">
                        <div class="card-header">
                            <span class="card-icon"><i data-lucide="${app.icon}"></i></span>
                            <span class="card-name">${app.name}</span>
                            <span class="status-blip" data-status="unknown" title="Checking..."></span>
                        </div>
                        <div class="card-desc">${app.desc}</div>
                        <div class="card-actions">
                            <a href="https://${app.url}" target="_blank" rel="noopener" class="btn btn-launch">launch &rarr;</a>
                            ${repoBtn}
                        </div>
                    </div>
                `;
            });
            container.appendChild(grid);
        });
        lucide.createIcons();

        // Status polling
        function updateStatus(data) {
            if (!data || !data.apps) return;
            let healthy = 0, total = apps.length;
            apps.forEach(app => {
                const info = data.apps[app.key];
                const card = document.querySelector(`[data-app="${app.key}"]`);
                if (!card) return;
                const blip = card.querySelector('.status-blip');
                if (!blip) return;
                const status = info ? info.status : 'unknown';
                blip.setAttribute('data-status', status);
                blip.title = info
                    ? `${status} — ${info.ready}/${info.desired} pods${info.httpOk ? ', HTTP ok' : ''}`
                    : 'No data';
                if (status === 'healthy') healthy++;
            });
            const el = document.getElementById('health-stat');
            el.innerHTML = `<span class="stat-value">${healthy}/${total}</span> healthy`;
        }

        function pollStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(updateStatus)
                .catch(() => {});
        }

        pollStatus();
        setInterval(pollStatus, 30000);
    </script>
</body>
</html>
